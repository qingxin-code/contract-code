server:
  port: 8080
  servlet:
    context-path: /api

spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/contract_cms?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root # 如果您的本地MySQL密码不同，请在此处修改或稍后提醒我修改

  # Jackson(日期格式化等)
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 打印 sql
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 自定义 JWT 配置
jwt:
  # 密钥 (实际应用中请使用更强且保密的字符串)
  secret: Y29udHJhY3RfY21zX3N5c3RlbV9zZWNyZXRfa2V5X2hhc2hfeHh4X3l5eV96eno=
  # 过期时间 (毫秒)，默认设置 24 小时
  expiration: 86400000
